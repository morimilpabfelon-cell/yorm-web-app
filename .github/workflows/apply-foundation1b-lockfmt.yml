name: Apply Foundation 1B lock and formatting

on:
  push:
    branches:
      - foundation/postgres-identity-v1

permissions:
  contents: write

jobs:
  lock-format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: foundation/postgres-identity-v1
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply canonical formatting and lockfile
        run: |
          cargo fmt --all
          cargo generate-lockfile

      - name: Commit canonical result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-foundation1b-lockfmt.yml
          git add -A
          git diff --cached --check
          git commit -m "style: lock and format Foundation 1B"
          git push origin HEAD:foundation/postgres-identity-v1
