name: Foundation 2B fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: >-
      github.head_ref == 'foundation/p2p-transfer-v1' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: yorm_pay_test
          POSTGRES_USER: yorm
          POSTGRES_PASSWORD: yorm_test_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yorm -d yorm_pay_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://yorm:yorm_test_only@127.0.0.1:5432/yorm_pay_test?sslmode=disable
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: foundation/p2p-transfer-v1
          fetch-depth: 0
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - name: Fix concurrent key lifetimes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/api/tests/p2p_transfers.rs')
          text = path.read_text()
          marker = '    let first_request = request(\n'
          replacement = (
              '    let first_transfer_key = unique_key("concurrent-one");\n'
              '    let second_transfer_key = unique_key("concurrent-two");\n\n'
              '    let first_request = request(\n'
          )
          if marker not in text:
              raise SystemExit('first request marker not found')
          text = text.replace(marker, replacement, 1)
          text = text.replace(
              'Some(&unique_key("concurrent-one"))',
              'Some(&first_transfer_key)',
              1,
          )
          text = text.replace(
              'Some(&unique_key("concurrent-two"))',
              'Some(&second_transfer_key)',
              1,
          )
          path.write_text(text)
          PY
          rm -f foundation2b-clippy.txt
          cargo fmt --all
          cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/tests/p2p_transfers.rs foundation2b-clippy.txt
          git commit -m "test: fix Foundation 2B concurrent key lifetimes"
          git push origin HEAD:foundation/p2p-transfer-v1
