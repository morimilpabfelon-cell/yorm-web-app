name: Capture Foundation 1B Clippy diagnostics

on:
  push:
    branches:
      - foundation/postgres-identity-v1

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: foundation/postgres-identity-v1
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Capture Clippy output
        shell: bash
        run: |
          set +e
          cargo clippy --workspace --all-targets --all-features -- -D warnings > foundation1b-clippy.txt 2>&1
          status=$?
          echo "exit_status=$status" >> foundation1b-clippy.txt
          exit 0

      - name: Commit diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/capture-foundation1b-clippy.yml
          git add foundation1b-clippy.txt
          git commit -m "chore: capture Foundation 1B Clippy diagnostics"
          git push origin HEAD:foundation/postgres-identity-v1
