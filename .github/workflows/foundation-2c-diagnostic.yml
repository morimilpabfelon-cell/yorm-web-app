name: Foundation 2C fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: >-
      github.head_ref == 'foundation/activity-receipts-v1' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: yorm_pay_test
          POSTGRES_USER: yorm
          POSTGRES_PASSWORD: yorm_test_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yorm -d yorm_pay_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://yorm:yorm_test_only@127.0.0.1:5432/yorm_pay_test?sslmode=disable
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: foundation/activity-receipts-v1
          fetch-depth: 0
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - name: Fix unused constants
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/api/src/store/activity.rs')
          text = path.read_text()
          text = text.replace('const SANDBOX_CREDIT_KIND: &str = "sandbox_credit";\n', '')
          text = text.replace('const SANDBOX_P2P_TRANSFER_KIND: &str = "sandbox_p2p_transfer";\n', '')
          path.write_text(text)
          PY
          rm -f foundation2c-clippy.txt
          cargo fmt --all
          cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src/store/activity.rs foundation2c-clippy.txt
          git commit -m "fix: remove unused Foundation 2C constants"
          git push origin HEAD:foundation/activity-receipts-v1
