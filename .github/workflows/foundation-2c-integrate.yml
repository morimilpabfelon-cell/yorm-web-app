name: Foundation 2C integration

on:
  pull_request:

permissions:
  contents: write

jobs:
  integrate:
    if: >-
      github.head_ref == 'foundation/activity-receipts-v1' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Foundation 2C branch
        uses: actions/checkout@v4
        with:
          ref: foundation/activity-receipts-v1
          fetch-depth: 0
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply integration
        run: |
          python .github/scripts/foundation2c_integrate.py
          cargo fmt --all
      - name: Commit integration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md README.md apps packages scripts
          git commit -m "feat: add Foundation 2C activity and receipts"
          git push origin HEAD:foundation/activity-receipts-v1
