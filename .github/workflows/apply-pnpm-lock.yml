name: Generate pnpm lockfile

on:
  push:
    branches:
      - foundation/monorepo-v0

permissions:
  contents: write

jobs:
  lock-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: foundation/monorepo-v0
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.5 --activate

      - name: Generate lockfile
        run: pnpm install --lockfile-only

      - name: Validate frozen install and TypeScript
        run: |
          pnpm install --frozen-lockfile
          pnpm typecheck
          pnpm build

      - name: Commit lockfile
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-pnpm-lock.yml
          git add pnpm-lock.yaml
          git diff --cached --check
          git commit -m "chore: lock TypeScript dependencies"
          git push origin HEAD:foundation/monorepo-v0
