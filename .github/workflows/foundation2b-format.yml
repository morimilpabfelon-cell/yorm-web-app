name: Foundation 2B rustfmt

on:
  pull_request:

permissions:
  contents: write

jobs:
  rustfmt:
    if: >-
      github.head_ref == 'foundation/p2p-transfer-v1' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Foundation 2B branch
        uses: actions/checkout@v4
        with:
          ref: foundation/p2p-transfer-v1
          fetch-depth: 0
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply canonical formatting
        run: cargo fmt --all
      - name: Commit formatting
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src apps/api/tests
          git commit -m "style: apply Foundation 2B rustfmt"
          git push origin HEAD:foundation/p2p-transfer-v1
