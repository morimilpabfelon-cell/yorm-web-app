name: Foundation CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose-foundation2a-integration:
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref == 'foundation/wallet-ledger-v1' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: foundation/wallet-ledger-v1
          fetch-depth: 0
      - name: Capture patch diagnostic
        shell: bash
        run: |
          set +e
          python scripts/apply_foundation2a_patch.py > foundation2a-patch.log 2>&1
          status=$?
          printf '\nexit_status=%s\n' "$status" >> foundation2a-patch.log
          exit 0
      - name: Commit diagnostic
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add foundation2a-patch.log
          git commit -m "chore: capture Foundation 2A patch diagnostic"
          git push origin HEAD:foundation/wallet-ledger-v1

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.5 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build

  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: yorm_pay_test
          POSTGRES_USER: yorm
          POSTGRES_PASSWORD: yorm_test_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yorm -d yorm_pay_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://yorm:yorm_test_only@127.0.0.1:5432/yorm_pay_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build
        run: cargo build --workspace
