name: Foundation CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose-wallet-ledger:
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref == 'foundation/wallet-ledger-v1' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: yorm_pay_test
          POSTGRES_USER: yorm
          POSTGRES_PASSWORD: yorm_test_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yorm -d yorm_pay_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://yorm:yorm_test_only@127.0.0.1:5432/yorm_pay_test?sslmode=disable
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: foundation/wallet-ledger-v1
          fetch-depth: 0
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Capture focused test
        shell: bash
        run: |
          set +e
          cargo test --test wallet_creation_debug -- --nocapture > foundation2a-test.txt 2>&1
          status=$?
          printf '\nexit_status=%s\n' "$status" >> foundation2a-test.txt
          exit 0
      - name: Commit diagnostic
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add foundation2a-test.txt
          git commit -m "chore: isolate Foundation 2A wallet creation error"
          git push origin HEAD:foundation/wallet-ledger-v1
