name: Foundation CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-foundation2a-integration:
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref == 'foundation/wallet-ledger-v1' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: foundation/wallet-ledger-v1
          fetch-depth: 0
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Normalize documentation baseline
        shell: python
        run: |
          from pathlib import Path

          readme_path = Path("README.md")
          readme = readme_path.read_text()
          readme = readme.replace(
              """FOUNDATION 1B — IN PROGRESS
          SANDBOX ONLY
          POSTGRESQL IDENTITY PERSISTENCE
          REAL MONEY DISABLED""",
              """FOUNDATION 0 — IN PROGRESS
          SANDBOX ONLY
          REAL MONEY DISABLED""",
          )
          readme = readme.replace(
              """GET http://127.0.0.1:8787/health
          GET http://127.0.0.1:8787/health/database
          GET http://127.0.0.1:8787/v1/system/status""",
              """GET http://127.0.0.1:8787/health
          GET http://127.0.0.1:8787/v1/system/status""",
          )
          readme = readme.replace("Tracks #5.", "Tracks #1.")
          readme_path.write_text(readme)
      - name: Apply integration patch
        run: python scripts/apply_foundation2a_patch.py
      - name: Finalize Foundation 2A documentation
        shell: python
        run: |
          from pathlib import Path

          agents_path = Path("AGENTS.md")
          agents = agents_path.read_text()
          agents = agents.replace(
              """- Foundation 1B persiste únicamente identidad sandbox, sesiones, PIN y bloqueos en PostgreSQL.
          - No registrar PIN, tokens Bearer, hashes Argon2, digests de sesión ni `DATABASE_URL` en logs.
          - La base de datos de Foundation 1B no puede incorporar tablas de wallet, saldos, ledger o pagos.""",
              """- La ejecución normal usa PostgreSQL; el backend en memoria existe solo para pruebas unitarias rápidas.
          - No registrar PIN, tokens Bearer, hashes Argon2, digests de sesión, claves idempotentes ni `DATABASE_URL` en logs.
          - Wallet y ledger solo pueden operar en sandbox dentro del Issue #7.
          - Transacciones y asientos posteados son inmutables y todo saldo se deriva del ledger.""",
          )
          agents_path.write_text(agents)
      - name: Format Rust
        run: cargo fmt --all
      - name: Commit integration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/apply_foundation2a_patch.py
          rm -f foundation2a-patch.log
          git add AGENTS.md README.md apps/api/src packages/contracts/src/index.ts
          git diff --cached --check
          git commit -m "feat: integrate Foundation 2A wallet API"
          git push origin HEAD:foundation/wallet-ledger-v1

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.5 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build

  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: yorm_pay_test
          POSTGRES_USER: yorm
          POSTGRES_PASSWORD: yorm_test_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yorm -d yorm_pay_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://yorm:yorm_test_only@127.0.0.1:5432/yorm_pay_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build
        run: cargo build --workspace
